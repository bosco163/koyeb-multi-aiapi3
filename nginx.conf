server {
    listen 8080 default_server;

    # 1. Koyeb 健康检查端点 (核心，必须存在)
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'healthy';
    }

    # 2. 默认主页
    location = / {
        add_header Content-Type text/html;
        return 200 '<!DOCTYPE html><html><head><title>AI Service Gateway</title><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=0"><style>body{font-family:sans-serif;max-width:800px;margin:40px auto;padding:20px;} h1{color:#333;} a{color:#06c; text-decoration:none;} a:hover{text-decoration:underline;} .service{margin:15px 0; padding:10px; background:#f5f5f5; border-radius:5px;}</style></head><body><h1>🚀 AI 服务网关正在运行</h1><p>所有后端AI服务已启动。通过以下路径访问：</p><div class="service"><strong>DS2API (DeepSeek/OpenAI/Claude兼容):</strong> <a href="/ds/">/ds/</a> | <a href="/ds/admin">/ds/admin</a> (管理台)</div><div class="service"><strong>QwenChat2Api:</strong> <a href="/qw/">/qw/</a></div><div class="service"><strong>Qwen2API (Web):</strong> <a href="/api/">/api/</a></div><div class="service"><strong>Edge TTS:</strong> <a href="/v1/audio">/v1/audio</a></div><hr><p><small>健康检查: <a href="/healthz">/healthz</a> | 状态: <span style="color:green;">● 运行中</span></small></p></body></html>';
    }

    # 3. Nginx 状态页面
    location /nginx_status {
        stub_status;
        access_log off;
        allow all;
    }

    # 4. Edge TTS -> 5050
    location ^~ /v1/audio {
        proxy_pass http://127.0.0.1:5050;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 5. DS2API -> 8000 (支持 /v1/* /anthropic/* /admin /healthz /readyz)
    location /ds/ {
        rewrite ^/ds/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # SSE 流式支持
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        tcp_nodelay on;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # 6. QwenChat2Api -> 8001
    location /qw/ {
        rewrite ^/qw/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 7. Qwen2API -> 3000
    location /api/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 8. 默认404处理
    location / {
        return 404;
    }
}
